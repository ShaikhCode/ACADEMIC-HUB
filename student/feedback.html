    <section id="feedback">
        <h1>Submit Your Feedback</h1>
        <div class="feedback-container">
            <form action="#">
                <div class="form-group">
                    <label for="student-name">Name:</label>
                    <input type="text" id="student-name" name="student-name" placeholder="Enter your full name" required>
                </div>
                
                <div class="form-group">
                    <label for="student-id">Student ID:</label>
                    <input type="text" id="student-id" name="student-id" placeholder="Enter your student ID" required>
                </div>
                
                <div class="form-group">
                    <label for="feedback-type">Feedback Type:</label>
                    <select id="feedback-type" name="feedback-type" required>
                        <option value="general">General</option>
                        <option value="suggestion">Suggestion</option>
                        <option value="complaint">Complaint</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="feedback-message">Your Feedback:</label>
                    <textarea id="feedback-message" name="feedback-message" placeholder="Write your feedback here..." rows="5" required></textarea>
                </div>
                
                <button type="submit" class="submit-btn">Submit Feedback</button>
            </form>
        </div>
    </section>
